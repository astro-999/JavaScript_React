<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>DOM</h1>
    <p>Document Object Model</p>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Obcaecati ut veniam incidunt repellat nisi, quod deserunt ex nesciunt sit, enim labore illo consectetur ullam? Quo, eius aliquid? Eius, quisquam adipisci.  </p>
    
    <div id="buton"><button> click me</button> </div>
    

</body>
<script>
    const h1 = document.body.children[0];
    h1.textContent = 'Hello World';
    console.log(h1);
    <!-- dom  -->
    const mydiv = document.createElement('div');
    console.log(mydiv);
    
    const p = document.createElement('paragraph');
    p.textContent = 'this is a paragraph';
    mydiv.appendChild(p);
    
    const b1 = document.getElementById("buton");
    b1.addEventListener('click',fun);
    function fun(){
        b1.textContent = 'clicked';
        alert('button clicked');
    }


    

</script>
</html>
